name: CI

on:
  push:
  pull_request:

jobs:
  offline-suite:
    name: bats + shellcheck + syntax (no KVM)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: >
          dnf -y install bats ShellCheck jq sqlite python3 libxml2 qemu-img
          guestfs-tools nftables
          openssl util-linux diffutils procps-ng acl iproute findutils
          coreutils tar gzip git shadow-utils util-linux-user hostname

      - uses: actions/checkout@v4

      - name: Syntax gates (bash -n + python ast)
        run: |
          set -e
          for f in bin/* src/*.sh tools/*.sh tests/*.sh tests/*/*.sh; do bash -n "$f"; done
          for f in src/*.py; do python3 -c "import ast; ast.parse(open('$f').read())"; done

      - name: shellcheck (documented per-file exceptions only)
        run: |
          set -e
          shellcheck -x -s bash --exclude=SC2163,SC2012 bin/dr-vps-setup
          shellcheck -x -s bash --exclude=SC2034 src/dr_vps_domain.sh
          # SC2016 = intentional single-quoted templates emitted for the GUEST shell (markers/vars must
          # stay literal at printf time and expand remotely). Same class in snapshot.sh and image.sh.
          shellcheck -x -s bash --exclude=SC2016 src/dr_vps_snapshot.sh
          shellcheck -x -s bash --exclude=SC2016 src/dr_vps_image.sh
          for f in bin/dr-vps bin/rigctl bin/drvps-rigctl bin/drvps-rigreaper bin/drvps-rigsubmit bin/make-pack.sh tools/*.sh; do
            shellcheck -x -s bash "$f"
          done
          for f in src/dr_vps_*.sh; do
            case "$f" in */dr_vps_domain.sh|*/dr_vps_snapshot.sh|*/dr_vps_image.sh) continue;; esac
            shellcheck -x -s bash "$f"
          done

      # The seam suite asserts unprivileged permission behavior (0700 refusals etc.),
      # so it must NOT run as root -- run it as a dedicated user.
      - name: Offline bats suite (741 tests, seamed -- no /dev/kvm)
        run: |
          set -e
          useradd -m ci
          chown -R ci: .
          runuser -u ci -- bash -c 'set -e; for f in tests/*.bats; do echo "== $f"; bats "$f"; done'

      - name: No internal review residue (forbidden patterns)
        run: |
          set -e
          # (1) internal reviewer handle, any case, whole release tree
          ! grep -rniE 'winhelm' --exclude-dir=.git --exclude-dir=.github . || { echo "forbidden reviewer handle found"; exit 1; }
          # (2) lowercase bare provider tokens (public product names ChatGPT/Grok are allowed)
          ! grep -rnE '\bgpt\b|\bgrok\b' --exclude-dir=.git --exclude-dir=.github . || { echo "forbidden provider shorthand found"; exit 1; }
          # (3) internal review-label classes in names/comments
          ! grep -rnE 'finding r?[0-9]+:|CODE review r[0-9]|FIX-r[0-9]|R[0-9]-N[0-9]|[A-Z][0-9]*-MUST-[0-9]|\b[A-Z]-N[0-9]\b|review #[0-9]|review-final|round-[0-9]+ review|winhelm conv r[0-9]|whole-drvps r[0-9]|6angle|ARCH r[0-9] f[0-9]|\bCOR-[0-9]+\b|\bMOCK-[0-9]\b|\br[0-9]+ [MBf][0-9]+\b' --exclude-dir=.git --exclude-dir=.github . || { echo "forbidden review label found"; exit 1; }
