name: CI

on:
  push:
  pull_request:

jobs:
  offline-suite:
    name: bats + shellcheck + syntax (no KVM)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: >
          dnf -y install bats ShellCheck jq sqlite python3 libxml2 qemu-img
          guestfs-tools nftables
          openssl util-linux diffutils procps-ng acl iproute findutils
          coreutils tar gzip git shadow-utils util-linux-user hostname

      - uses: actions/checkout@v4

      - name: Syntax gates (bash -n + python ast, dispatched by shebang)
        run: |
          set -e
          # bin/ mixes bash and python (python entry points: drvps-egress-approve, drvps-egress-migrate,
          # drvps-skill-install) -- dispatch on the shebang so `bash -n` never sees a python file and vice versa.
          for f in bin/* src/*.sh tools/*.sh tools/drvps-top tests/*.sh tests/*/*.sh; do
            [ -f "$f" ] || continue     # skip any stray directory (e.g. an untracked __pycache__)
            case "$(head -1 "$f")" in
              *python*) python3 -c "import ast, sys; ast.parse(open(sys.argv[1]).read())" "$f" ;;
              *)        bash -n "$f" ;;
            esac
          done
          # ast-check every shipped python module too (src + tools), not only src/*.py
          for f in src/*.py tools/*.py; do python3 -c "import ast, sys; ast.parse(open(sys.argv[1]).read())" "$f"; done

      - name: shellcheck (documented per-file exceptions only)
        run: |
          set -e
          shellcheck -x -s bash --exclude=SC2163,SC2012 bin/dr-vps-setup
          shellcheck -x -s bash --exclude=SC2034 src/dr_vps_domain.sh
          # SC2016 = intentional single-quoted templates emitted for the GUEST shell (markers/vars must
          # stay literal at printf time and expand remotely). Same class in snapshot.sh and image.sh.
          shellcheck -x -s bash --exclude=SC2016 src/dr_vps_snapshot.sh
          shellcheck -x -s bash --exclude=SC2016 src/dr_vps_image.sh
          for f in bin/dr-vps bin/rigctl bin/drvps-rigctl bin/drvps-rigreaper bin/drvps-rigsubmit bin/make-pack.sh \
                   bin/drvps-top bin/drvps-top-operator bin/drvps-top-publish tools/*.sh; do
            shellcheck -x -s bash "$f"
          done
          # SC2034 = read-target field vars in `IFS=| read -r ...` the operator TUI does not all consume
          # (same class excluded for dr_vps_domain.sh).
          shellcheck -x -s bash --exclude=SC2034 tools/drvps-top
          for f in src/dr_vps_*.sh; do
            case "$f" in */dr_vps_domain.sh|*/dr_vps_snapshot.sh|*/dr_vps_image.sh) continue;; esac
            shellcheck -x -s bash "$f"
          done

      # The offline gate must NOT run as root -- the seam suite asserts 0700/0600 refusals a root process would
      # bypass. tests/release-gate.sh is the CANONICAL offline runner: bats PLUS the python + sh suites CI used
      # to skip entirely (11 python suites incl. drvps-top-feed's 291 checks, ~10 sh tests), so a green CI now
      # means the whole offline suite passed. (The syntax + shellcheck steps above stay as a fast root pre-check.)
      - name: Offline release gate (bats + python + sh, seamed -- no /dev/kvm)
        run: |
          set -e
          useradd -m ci
          chown -R ci: .
          runuser -u ci -- bash tests/release-gate.sh

      - name: No internal review residue (forbidden patterns)
        run: |
          set -e
          # tests/release-gate.sh is the ONLY tree file that legitimately contains these tokens (its own search
          # patterns), so it is excluded from every scan -- else the gate flags its own checker (self-reference).
          # (1) internal reviewer handle, any case, whole release tree
          ! grep -rniE 'winhelm' --exclude-dir=.git --exclude-dir=.github --exclude=release-gate.sh . || { echo "forbidden reviewer handle found"; exit 1; }
          # (2) lowercase bare provider tokens (public product names ChatGPT/Grok are allowed)
          ! grep -rnE '\bgpt\b|\bgrok\b' --exclude-dir=.git --exclude-dir=.github --exclude=release-gate.sh . || { echo "forbidden provider shorthand found"; exit 1; }
          # (3) internal review-label classes in names/comments
          ! grep -rnE 'finding r?[0-9]+:|CODE review r[0-9]|FIX-r[0-9]|R[0-9]-N[0-9]|[A-Z][0-9]*-MUST-[0-9]|\b[A-Z]-N[0-9]\b|review #[0-9]|review-final|round-[0-9]+ review|winhelm conv r[0-9]|whole-drvps r[0-9]|6angle|ARCH r[0-9] f[0-9]|\bCOR-[0-9]+\b|\bMOCK-[0-9]\b|\br[0-9]+ [MBf][0-9]+\b' --exclude-dir=.git --exclude-dir=.github --exclude=release-gate.sh . || { echo "forbidden review label found"; exit 1; }
